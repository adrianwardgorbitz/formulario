<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Diamond Mentorship - Adrian Ward</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3258/3258502.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --fuxion-blue: #0033A0; --accent: #00d4ff; --bg: #05070a; --border: rgba(255,255,255,0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: #fff; line-height: 1.6; color-scheme: dark; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .hero h1 { text-align: center; font-size: clamp(28px, 7vw, 45px); font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-number { display: block; font-size: 22px; font-weight: 800; color: #fff; }
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 600; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 25px; overflow: hidden; margin-bottom: 40px; border: 1px solid var(--border); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .bio-section { background: linear-gradient(145deg, rgba(0,51,160,0.1), rgba(17,24,39,0.8)); border: 1px solid var(--fuxion-blue); border-radius: 25px; padding: 25px; margin-bottom: 40px; text-align: center; }
        .glass-card { background: rgba(17,24,39,0.95); border: 1px solid var(--border); border-radius: 30px; padding: 30px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; background: #161b22 !important; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff !important; margin-bottom: 15px; font-size: 14px; outline: none; font-family: inherit; }
        .btn-submit { width: 100%; padding: 20px; background: linear-gradient(90deg, var(--fuxion-blue), #007AFF); border: none; border-radius: 15px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-bottom: 20px; }
        .btn-submit:disabled { opacity: 0.5; }
        .github-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-github { padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 12px; color: #fff; text-decoration: none; text-align: center; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        @media (max-width: 600px) { .stats-grid, .input-grid, .github-btns { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero"><h1>The Diamond Mentorship</h1></header>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-number">$8M</span><span class="stat-label">Ventas</span></div>
            <div class="stat-card"><span class="stat-number">20k+</span><span class="stat-label">Clientes</span></div>
            <div class="stat-card"><span class="stat-number">TOP</span><span class="stat-label">Hall Millonario</span></div>
        </div>

        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/U33TC3cmd5E" allowfullscreen></iframe>
        </div>

        <section class="bio-section">
            <h3>Evaluación de Liderazgo</h3>
            <p style="font-size: 14px; opacity: 0.8;">Completa tus datos para unirte al equipo.</p>
        </section>

        <section class="glass-card">
            <form id="mentorshipForm">
                <div class="input-grid">
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-grid">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp" required>
                    <input type="text" id="instagram" placeholder="Instagram">
                </div>
                <div class="input-grid">
                    <input type="number" id="edad" placeholder="Edad" required>
                    <input type="text" id="ciudad" placeholder="Ciudad / País" required>
                </div>
                <textarea id="gusto" placeholder="¿Qué fue lo que más te gustó del video?" rows="2" required></textarea>
                <div class="input-grid">
                    <select id="disponibilidad" required>
                        <option value="" disabled selected>Horas semanales</option>
                        <option value="5-10">5-10 horas</option>
                        <option value="10-20">10-20 horas</option>
                        <option value="20+">Full Focus (20h+)</option>
                    </select>
                    <select id="ritmo" required>
                        <option value="" disabled selected>Compromiso</option>
                        <option value="Rápido">Velocidad Diamante 🚀</option>
                        <option value="Moderado">Construcción Sólida ⚡</option>
                    </select>
                </div>
                <textarea id="sobre_ellos" placeholder="Cuéntame tus metas..." rows="3" required></textarea>

                <button type="submit" class="btn-submit" id="submitBtn">FINALIZAR Y UNIRME</button>
            </form>

            <div class="github-btns">
                <a href="https://adrianwardgorbitz.github.io/liderazgo" target="_blank" class="btn-github">Test de Liderazgo</a>
                <a href="https://adrianwardgorbitz.github.io/cuestionario" target="_blank" class="btn-github">Cuestionario</a>
            </div>
        </section>
    </div>

    <script>
        const CONFIG = { 
            webhook: "https://hook.eu1.make.com/cmma9n6v7egfcmtdjjx85kuc72p83b3k",
            whatsapp_link: "https://chat.whatsapp.com/KtBu7mszVBOE2oMdf0bFl1"
        };

        document.getElementById('mentorshipForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; 
            btn.innerText = 'PROCESANDO...';
            
            const payload = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('whatsapp').value,
                instagram: document.getElementById('instagram').value,
                edad: document.getElementById('edad').value,
                ciudad: document.getElementById('ciudad').value,
                gusto: document.getElementById('gusto').value,
                disponibilidad: document.getElementById('disponibilidad').value,
                ritmo: document.getElementById('ritmo').value,
                sobre_ellos: document.getElementById('sobre_ellos').value
            };

            // MODO TURBO
            fetch(CONFIG.webhook, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            });
            
            // REDIRECCIÓN EN NUEVA PESTAÑA
            setTimeout(() => {
                window.open(CONFIG.whatsapp_link, '_blank');
                btn.innerText = '¡EXITO!';
                alert("¡Perfil enviado! Te hemos abierto el grupo de WhatsApp en una nueva pestaña.");
            }, 600);
        });
    </script>
</body>
</html>
