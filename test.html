<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Diamond Mentorship - Adrian Ward</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --fuxion-blue: #0033A0; --accent: #00d4ff; --bg: #05070a; --border: rgba(255,255,255,0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: #fff; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .hero h1 { text-align: center; font-size: clamp(32px, 8vw, 50px); font-weight: 800; margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-number { display: block; font-size: 24px; font-weight: 800; }
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 600; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 25px; overflow: hidden; margin-bottom: 40px; border: 1px solid var(--border); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .glass-card { background: rgba(17,24,39,0.95); border: 1px solid var(--border); border-radius: 35px; padding: 30px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        
        .btn-submit { width: 100%; padding: 20px; background: linear-gradient(90deg, var(--fuxion-blue), #007AFF); border: none; border-radius: 15px; color: #fff; font-weight: 700; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; transform: scale(1.02); }

        /* Estilos del Dropdown de Reseñas */
        .reviews-dropdown { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 10px; }
        details { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 10px; cursor: pointer; }
        summary { font-weight: 700; color: var(--accent); text-align: center; padding: 15px; list-style: none; }
        
        .reviews-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; max-height: 500px; overflow-y: auto; padding: 5px; }
        .review-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
        .review-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
        .review-name { font-size: 11px; font-weight: 700; color: var(--accent); display: block; }
        .review-text { font-size: 10px; color: #ccc; font-style: italic; line-height: 1.3; margin-top: 4px; }

        @media (max-width: 600px) { .stats-grid, .input-grid, .reviews-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero"><h1>The Diamond Mentorship</h1></header>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-number">$8M</span><span class="stat-label">Ventas 2025</span></div>
            <div class="stat-card"><span class="stat-number">20k+</span><span class="stat-label">Clientes</span></div>
            <div class="stat-card"><span class="stat-number">TOP</span><span class="stat-label">Hall Millonario</span></div>
        </div>

        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/U33TC3cmd5E" allowfullscreen></iframe>
        </div>

        <section class="glass-card">
            <form id="mentorshipForm">
                <div class="input-grid">
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-grid">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp" required>
                    <input type="text" id="instagram" placeholder="Instagram (Opcional)">
                </div>
                <div class="input-grid">
                    <input type="number" id="edad" placeholder="Edad" required>
                    <input type="text" id="ciudad" placeholder="Ciudad / País" required>
                </div>
                <textarea id="gusto" placeholder="¿Qué fue lo que más te gustó del video?" rows="2" required></textarea>
                <div class="input-grid">
                    <select id="disponibilidad" required>
                        <option value="" disabled selected>Horas semanales</option>
                        <option value="5-10">5-10 h</option>
                        <option value="10-20">10-20 h</option>
                        <option value="20+">20h+ (Full Focus)</option>
                    </select>
                    <select id="ritmo" required>
                        <option value="" disabled selected>Nivel de Compromiso</option>
                        <option value="Rápido">Velocidad Diamante 🚀</option>
                        <option value="Moderado">Construcción Sólida ⚡</option>
                    </select>
                </div>
                <textarea id="metas" placeholder="Cuéntame de ti (A qué te dedicas, tus metas, etc.)" rows="3" required></textarea>
                <button type="submit" class="btn-submit" id="submitBtn">Enviar Aplicación</button>
            </form>

            <div class="reviews-dropdown">
                <details>
                    <summary>⭐ Ver Resultados Reales (Clic aquí)</summary>
                    <div id="reviewsGrid" class="reviews-grid">
                        <p id="loading" style="grid-column: 1/-1; text-align: center; font-size: 12px; color: #666;">Cargando...</p>
                    </div>
                </details>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ1iquQo-rcaI25-eStS8ZhwYI-lugCLk",
            authDomain: "degustaciones.firebaseapp.com",
            projectId: "degustaciones",
            storageBucket: "degustaciones.firebasestorage.app",
            messagingSenderId: "80590754347",
            appId: "1:80590754347:web:982cd91a00ddccc7f1106e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Cargar Reseñas desde Firebase
        async function loadReviews() {
            const grid = document.getElementById('reviewsGrid');
            try {
                const snap = await db.collection('reviews').orderBy('timestamp', 'desc').limit(16).get();
                document.getElementById('loading').style.display = 'none';
                snap.forEach(doc => {
                    const d = doc.data();
                    const photos = d.photoUrls || (d.photoUrl ? [d.photoUrl] : []);
                    if(photos.length > 0) {
                        const div = document.createElement('div');
                        div.className = 'review-item';
                        div.innerHTML = `
                            <img src="${photos[0]}" class="review-img">
                            <span class="review-name">${d.name || 'Cliente'}</span>
                            <p class="review-text">"${d.comment || ''}"</p>
                        `;
                        grid.appendChild(div);
                    }
                });
            } catch (e) { console.error(e); }
        }

        // Envío a Make
        document.getElementById('mentorshipForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = 'Enviando...';
            
            const payload = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('whatsapp').value,
                instagram: document.getElementById('instagram').value,
                edad: document.getElementById('edad').value,
                ciudad: document.getElementById('ciudad').value,
                gusto: document.getElementById('gusto').value,
                disponibilidad: document.getElementById('disponibilidad').value,
                ritmo: document.getElementById('ritmo').value,
                sobre_ellos: document.getElementById('metas').value
            };

            try {
                await fetch('https://hook.eu1.make.com/cmma9n6v7egfcmtdjjx85kuc72p83b3k', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                window.location.href = 'https://chat.whatsapp.com/KtBu7mszVBOE2oMdf0bFl1';
            } catch (err) {
                window.location.href = 'https://chat.whatsapp.com/KtBu7mszVBOE2oMdf0bFl1';
            }
        });

        window.onload = loadReviews;
    </script>
</body>
</html>
