<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Test de Liderazgo y Estilo de Vida | Adrian Ward</title>
    <meta name="description" content="Aplica al Test de Liderazgo de Adrian Ward. Evaluación exclusiva para emprendedores que buscan expandir su negocio con el sistema de mentoría Diamond.">
    <meta name="keywords" content="Adrian Ward, Liderazgo, Negocios, Mentoría, Fuxion, Libertad Financiera, Emprendimiento">
    <link rel="canonical" href="https://adrianwardgorbitz.github.io/liderazgo" />
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3258/3258502.png" type="image/png">

    <meta property="og:title" content="Test de Liderazgo - Adrian Ward">
    <meta property="og:description" content="¿Calificas para el equipo de expansión? Realiza el test ahora.">
    <meta property="og:image" content="https://tu-imagen-de-perfil-aqui.jpg"> <meta property="og:url" content="https://adrianwardgorbitz.github.io/liderazgo">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --fuxion-blue: #0033A0; --accent: #00d4ff; --bg: #05070a; --border: rgba(255,255,255,0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: #fff; line-height: 1.6; color-scheme: dark; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        /* HEADER SEO OPTIMIZED */
        .hero h1 { text-align: center; font-size: clamp(26px, 6vw, 40px); font-weight: 800; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; line-height: 1.2; }
        .hero h1 span { color: var(--accent); display: block; font-size: 14px; letter-spacing: 4px; font-weight: 600; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-number { display: block; font-size: 22px; font-weight: 800; color: #fff; }
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 600; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 25px; overflow: hidden; margin-bottom: 40px; border: 1px solid var(--border); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .bio-section { background: linear-gradient(145deg, rgba(0,51,160,0.1), rgba(17,24,39,0.8)); border: 1px solid var(--fuxion-blue); border-radius: 25px; padding: 25px; margin-bottom: 40px; text-align: center; }

        .glass-card { background: rgba(17,24,39,0.95); border: 1px solid var(--border); border-radius: 30px; padding: 30px; }
        .section-tag { color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }

        input, select, textarea { 
            width: 100%; background: #161b22 !important; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: #fff !important; margin-bottom: 15px; font-size: 14px; outline: none; font-family: inherit;
        }

        .btn-submit { width: 100%; padding: 20px; background: linear-gradient(90deg, var(--fuxion-blue), #007AFF); border: none; border-radius: 15px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,51,160,0.3); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,51,160,0.5); }
        
        .btn-tests { 
            width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent); border-radius: 15px; color: var(--accent); font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #calendly-container { display: none; margin-top: 20px; }
        .reviews-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; max-height: 500px; overflow-y: auto; padding: 10px; }
        .review-item { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }

        @media (max-width: 600px) { .stats-grid, .reviews-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <main class="container">
        <header class="hero">
            <h1><span>SISTEMA DE EXPANSIÓN GLOBAL</span>TEST DE LIDERAZGO</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-number">$8M+</span><span class="stat-label">Ventas Totales</span></div>
            <div class="stat-card"><span class="stat-number">20k+</span><span class="stat-label">Comunidad</span></div>
            <div class="stat-card"><span class="stat-number">TOP 1</span><span class="stat-label">Rango Diamante</span></div>
        </div>

        <section class="video-container">
            <iframe src="https://www.youtube.com/embed/U33TC3cmd5E" title="Video de Liderazgo Adrian Ward" allowfullscreen></iframe>
        </section>

        <section class="bio-section">
            <span class="section-tag">Fase 1: Calificación</span>
            <h2 id="form-title" style="font-size: 24px;">Cuestionario de Liderazgo</h2>
            <p id="form-subtitle" style="font-size: 14px; opacity: 0.8;">Completa el test para abrir tu mercado en una nueva ventana.</p>
        </section>

        <article class="glass-card">
            <form id="mentorshipForm">
                <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
                <div style="display: flex; gap: 10px;">
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="WhatsApp (Ej: +51...)" required style="flex: 2;">
                    <input type="number" id="edad" name="edad" placeholder="Edad" style="flex: 1;">
                </div>
                <input type="text" id="ciudad" name="ciudad" placeholder="Ciudad / País" required>
                
                <select id="disponibilidad" name="disponibilidad" required>
                    <option value="" disabled selected>Disponibilidad horaria</option>
                    <option value="5-10">5 a 10 horas/semana</option>
                    <option value="10-20">10 a 20 horas/semana</option>
                    <option value="20+">Full Focus (Enfoque Total)</option>
                </select>

                <textarea id="metas" name="metas" placeholder="¿Por qué deberías ser seleccionado para este equipo?" rows="3" required></textarea>
                
                <button type="submit" class="btn-submit" id="submitBtn">ENVIAR TEST DE LIDERAZGO</button>
            </form>

            <div id="calendly-container">
                <div class="calendly-inline-widget" data-url="https://calendly.com/adrianward_/15min" style="min-width:320px;height:700px;"></div>
                <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
            </div>

            <div id="tests-social-section">
                <span class="section-tag" style="text-align: center; margin-top: 10px;">Fase 2: Evidencia</span>
                <button class="btn-tests" onclick="toggleReviews()" id="btn-tests-ui">🔥 VER TEST DE ESTILO DE VIDA</button>

                <div class="reviews-dropdown" id="reviews-box">
                    <div id="reviews-content" style="display:none;">
                        <div id="reviewsGrid" class="reviews-grid">
                            <p id="loading" style="text-align: center; font-size: 11px; padding: 20px;">Accediendo a la base de resultados...</p>
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const CONFIG = { 
            webhook: "https://hook.eu1.make.com/cmma9n6v7egfcmtdjjx85kuc72p83b3k",
            whatsapp: "https://chat.whatsapp.com/KtBu7mszVBOE2oMdf0bFl1"
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBZ1iquQo-rcaI25-eStS8ZhwYI-lugCLk",
            authDomain: "degustaciones.firebaseapp.com",
            projectId: "degustaciones",
            storageBucket: "degustaciones.firebasestorage.app",
            messagingSenderId: "80590754347",
            appId: "1:80590754347:web:982cd91a00ddccc7f1106e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleReviews() {
            const content = document.getElementById('reviews-content');
            const isHidden = content.style.display === 'none';
            content.style.display = isHidden ? 'block' : 'none';
            document.getElementById('btn-tests-ui').innerText = isHidden ? "▲ CERRAR RESULTADOS" : "🔥 VER TEST DE ESTILO DE VIDA";
        }

        async function loadReviews() {
            const grid = document.getElementById('reviewsGrid');
            try {
                const snap = await db.collection('reviews').orderBy('timestamp', 'desc').limit(20).get();
                document.getElementById('loading').style.display = 'none';
                snap.forEach(doc => {
                    const d = doc.data();
                    const photos = d.photoUrls || (d.photoUrl ? [d.photoUrl] : []);
                    if(photos.length > 0) {
                        const div = document.createElement('div');
                        div.className = 'review-item';
                        div.innerHTML = `<img src="${photos[0]}" alt="Resultado socio Diamond" style="width:100%; border-radius:10px;"><p style="font-size:10px; margin-top:5px; color:#00d4ff; font-weight:600;">${d.name || 'Socio'}</p>`;
                        grid.appendChild(div);
                    }
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('mentorshipForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = 'CALIFICANDO...';
            
            const payload = {
                origen: "Página Liderazgo SEO",
                nombre: document.getElementById('nombre').value,
                whatsapp: document.getElementById('whatsapp').value,
                edad: document.getElementById('edad').value,
                ciudad: document.getElementById('ciudad').value,
                tiempo: document.getElementById('disponibilidad').value,
                motivacion: document.getElementById('metas').value
            };

            try {
                await fetch(CONFIG.webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                
                // Nueva pestaña para WhatsApp
                window.open(CONFIG.whatsapp, '_blank');

                // Mostrar Calendly
                document.getElementById('mentorshipForm').style.display = 'none';
                document.getElementById('tests-social-section').style.display = 'none';
                document.getElementById('form-title').innerText = 'Test de Liderazgo Recibido';
                document.getElementById('form-subtitle').innerText = 'WhatsApp abierto en nueva pestaña. Agenda tu entrevista ahora:';
                document.getElementById('calendly-container').style.display = 'block';
            } catch (err) { 
                window.open(CONFIG.whatsapp, '_blank');
                document.getElementById('mentorshipForm').style.display = 'none';
                document.getElementById('calendly-container').style.display = 'block';
            }
        });

        window.onload = loadReviews;
    </script>
</body>
</html>
