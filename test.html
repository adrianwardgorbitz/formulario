<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Mentoría</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: white; padding: 20px; }
        form { max-width: 500px; margin: auto; background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h2 { text-align: center; color: #25d366; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #bbb; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #333; border-radius: 8px; background: #222; color: white; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #25d366; outline: none; }
        button { width: 100%; padding: 15px; background-color: #25d366; color: black; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 25px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1eb954; transform: scale(1.02); }
        button:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <form id="mentorshipForm">
        <h2>🚀 APLICACIÓN MENTORÍA</h2>
        
        <label>Nombre Completo</label>
        <input type="text" id="nombre" required placeholder="Ej: Adrian Ward">

        <label>Email</label>
        <input type="email" id="email" required placeholder="tu@email.com">

        <label>WhatsApp</label>
        <input type="tel" id="whatsapp" required placeholder="Ej: +54 9...">

        <label>Usuario de Instagram</label>
        <input type="text" id="instagram" required placeholder="@tuusuario">

        <label>Edad</label>
        <input type="number" id="edad" required>

        <label>Ciudad y País</label>
        <input type="text" id="ciudad" required>

        <label>¿Qué es lo que más te gustó de lo que viste?</label>
        <textarea id="gusto" rows="2" required></textarea>

        <label>Disponibilidad diaria</label>
        <select id="disponibilidad">
            <option value="1-2 horas">1 a 2 horas</option>
            <option value="3-4 horas">3 a 4 horas</option>
            <option value="5+ horas">Más de 5 horas</option>
        </select>

        <label>¿A qué ritmo quieres ir?</label>
        <select id="ritmo">
            <option value="Tranquilo">Tranquilo pero constante</option>
            <option value="Rapido">Rápido, quiero resultados</option>
            <option value="Fuego">¡A fuego!</option>
        </select>

        <label>Cuéntame sobre ti y tus metas</label>
        <textarea id="sobre_ellos" rows="4" required placeholder="Escribe aquí..."></textarea>

        <button type="submit" id="submitBtn">ENVIAR PERFIL Y ABRIR WHATSAPP</button>
    </form>

    <script>
        // CONFIGURACIÓN
        const CONFIG = {
            webhook: "https://hook.us1.make.com/TU_WEBHOOK_AQUI", // REEMPLAZA CON TU URL DE MAKE
            whatsapp_link: "https://wa.me/TU_NUMERO_AQUI" // REEMPLAZA CON TU LINK DE WHATSAPP
        };

        document.getElementById('mentorshipForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; 
            btn.innerText = 'PROCESANDO...'; 
            
            const payload = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('whatsapp').value,
                instagram: document.getElementById('instagram').value,
                edad: document.getElementById('edad').value,
                ciudad: document.getElementById('ciudad').value,
                gusto: document.getElementById('gusto').value,
                disponibilidad: document.getElementById('disponibilidad').value,
                ritmo: document.getElementById('ritmo').value,
                sobre_ellos: document.getElementById('sobre_ellos').value
            };

            // Envío en segundo plano (Fast Fetch)
            fetch(CONFIG.webhook, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload)
            });

            // Redirección inmediata a WhatsApp
            setTimeout(() => {
                btn.innerText = '¡ENVIADO!';
                window.open(CONFIG.whatsapp_link, '_blank');
                alert("¡Perfil enviado con éxito!");
            }, 600);
        });
    </script>

</body>
</html>
